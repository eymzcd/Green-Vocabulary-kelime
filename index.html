<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blending - Kelime Türetme</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-color: #4caf50;
            --error-color: #f44336;
            --bg-glass: rgba(0, 0, 0, 0.65);
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; color: white;
            background-color: #1a1a1a;
        }

        #bg-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-size: cover; background-position: center;
            z-index: -1;
            transition: background-image 1.2s ease-in-out;
            background-repeat: no-repeat;
        }

        .card {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            padding: 30px 20px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            text-align: center;
            width: 92%; max-width: 550px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
        }

        .letter-container {
            display: flex; justify-content: center; gap: 6px;
            margin: 20px 0; flex-wrap: wrap;
            padding: 10px 5px;
        }

        .letter-input {
            width: clamp(30px, 8vw, 45px);
            height: clamp(40px, 10vw, 55px);
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: bold;
            text-align: center; text-transform: uppercase;
            border: 2px solid rgba(255,255,255,0.2); border-radius: 8px;
            background: rgba(255,255,255,0.1); color: white;
            outline: none; transition: all 0.2s;
        }

        .letter-input.correct { border-color: var(--primary-color); background: rgba(76, 175, 80, 0.4); border-width: 3px; }
        .letter-input.error { border-color: var(--error-color); background: rgba(244, 67, 54, 0.3); animation: shake 0.4s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        #tube-outer {
            position: fixed; left: 20px; top: 50%; transform: translateY(-50%);
            width: 20px; height: 250px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 30px; overflow: hidden; display: none;
        }

        #tube-fill {
            position: absolute; bottom: 0; width: 100%; height: 0%;
            background: linear-gradient(to top, #1b5e20, #4caf50);
            transition: height 0.6s ease;
        }

        .timer-info { font-size: 1rem; margin-bottom: 15px; display: flex; justify-content: space-between; color: #ddd; }
        #countdown { color: #ff9800; font-weight: bold; }

        .btn {
            background: var(--primary-color); color: white; border: none;
            padding: 16px 32px; font-size: 1.1rem; font-weight: bold;
            border-radius: 14px; cursor: pointer; transition: 0.3s;
            margin: 10px; width: 85%;
        }
        .btn:hover { transform: scale(1.05); background: #43a047; }

        @media (max-width: 768px) {
            #tube-outer { left: 10px; height: 200px; width: 15px; }
        }
    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <div id="tube-outer"><div id="tube-fill"></div></div>

    <div class="card" id="menu-screen">
        <h1 style="color: var(--primary-color); margin-bottom: 10px; letter-spacing: 2px;">BLENDİNG</h1>
        <p>Kelimeleri birleştir, sistemi enerjiyle doldur!</p>
        <button class="btn" onclick="startGame('free')">SÜRESİZ MOD</button><br>
        <button class="btn" onclick="startGame('timed')" style="background: #e67e22;">SÜRELİ MOD (15s)</button>
    </div>

    <div class="card" id="game-screen" style="display: none;">
        <div class="timer-info">
            <span>Zaman: <span id="stopwatch">00:00</span></span>
            <span id="q-counter">1 / 10</span>
            <span id="timed-ui" style="display: none;">Kalan: <span id="countdown">15</span>s</span>
        </div>
        <div id="current-formula" style="font-size: 1.5rem; margin: 20px 0; font-weight: bold;">---</div>
        <div class="letter-container" id="letter-container"></div>
        <div id="feedback" style="height: 20px; font-size: 0.9rem;"></div>
    </div>

    <div class="card" id="final-screen" style="display: none;">
        <h1 style="color: gold;">Görev Tamamlandı!</h1>
        <p>Toplam Süre: <span id="final-time">00:00</span></p>
        <p id="final-score-text"></p>
        <button class="btn" onclick="location.reload()">YENİDEN BAŞLA</button>
    </div>

<script>
const correctSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2870/2870-preview.mp3');
const errorSound = new Audio('https://assets.mixkit.co/active_storage/sfx/946/946-preview.mp3');

const allWords = [
    {q: "Bloom + Biology", a: "Bloomology"}, {q: "Sprout + Maintain", a: "Sproutain"}, {q: "Floral + Universe", a: "Floraverse"},
    {q: "Verdant + Nature", a: "Verdanture"}, {q: "Stem + Empathy", a: "Stempathy"}, {q: "Seed + Landscape", a: "Seedscape"},
    {q: "Branch + Chic", a: "Branchic"}, {q: "Moss + Osmosis", a: "Mossmosis"}, {q: "Twig + Digital", a: "Twigital"},
    {q: "Leaf + Purity", a: "Leafity"}, {q: "Vine + Innovate", a: "Vinevate"}, {q: "Fern + Finish", a: "Fernish"},
    {q: "Root + Utopia", a: "Rootopia"}, {q: "Bud + Flow", a: "Budflow"}, {q: "Bark + Architecture", a: "Barkitecture"}
];

let currentIndex = 0;
let gameData = [];
let gameMode = 'free';
let startTime, timerInterval, countdownInterval;
let timeLeft = 15;
let tubeEnergy = 0;
let correctCount = 0;

// 🌙 GECE ARKA PLANI (SVG)
const nightBackground = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1920 1080'%3E%3Cdefs%3E%3ClinearGradient id='nightGrad' x1='0%25' y1='0%25' x2='0%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%230a1550;stop-opacity:1'/%3E%3Cstop offset='100%25' style='stop-color:%23001f3f;stop-opacity:1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='1920' height='1080' fill='url(%23nightGrad)'/%3E%3C!-- Stars --%3E%3Ccircle cx='150' cy='100' r='1.5' fill='white' opacity='0.8'/%3E%3Ccircle cx='400' cy='150' r='1' fill='white' opacity='0.6'/%3E%3Ccircle cx='800' cy='80' r='2' fill='white' opacity='0.9'/%3E%3Ccircle cx='1200' cy='120' r='1.5' fill='white' opacity='0.7'/%3E%3Ccircle cx='1600' cy='200' r='1' fill='white' opacity='0.5'/%3E%3Ccircle cx='1800' cy='90' r='2' fill='white' opacity='0.8'/%3E%3Ccircle cx='300' cy='250' r='1' fill='white' opacity='0.4'/%3E%3Ccircle cx='950' cy='300' r='1.5' fill='white' opacity='0.6'/%3E%3Ccircle cx='1400' cy='180' r='1' fill='white' opacity='0.5'/%3E%3C!-- Moon --%3E%3Ccircle cx='960' cy='250' r='120' fill='%23fffacd' opacity='0.95'/%3E%3Ccircle cx='980' cy='230' r='120' fill='%230a1550' opacity='0.3'/%3E%3C!-- Clouds --%3E%3Cellipse cx='200' cy='400' rx='150' ry='80' fill='%234a6fa5' opacity='0.6'/%3E%3Cellipse cx='280' cy='420' rx='120' ry='70' fill='%233a5a95' opacity='0.5'/%3E%3Cellipse cx='1600' cy='350' rx='200' ry='90' fill='%234a6fa5' opacity='0.6'/%3E%3Cellipse cx='1720' cy='370' rx='150' ry='75' fill='%233a5a95' opacity='0.5'/%3E%3C!-- Mountains --%3E%3Cpolygon points='100,800 400,400 700,800' fill='%231a3a6b' opacity='0.7'/%3E%3Cpolygon points='600,800 900,450 1200,800' fill='%232a4a7b' opacity='0.6'/%3E%3Cpolygon points='1100,800 1400,500 1700,800' fill='%231a3a6b' opacity='0.7'/%3E%3Cpolygon points='1500,800 1760,480 1920,800' fill='%232a4a7b' opacity='0.6'/%3E%3C!-- Ground --%3E%3Crect y='800' width='1920' height='280' fill='%23224455'/%3E%3Crect y='900' width='1920' height='180' fill='%23334466'/%3E%3C/svg%3E`;

// ☀️ GÜNDÜZ ARKA PLANI (SVG)
const dayBackground = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1920 1080'%3E%3Cdefs%3E%3ClinearGradient id='dayGrad' x1='0%25' y1='0%25' x2='0%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%2387CEEB;stop-opacity:1'/%3E%3Cstop offset='100%25' style='stop-color:%23E0F6FF;stop-opacity:1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='1920' height='1080' fill='url(%23dayGrad)'/%3E%3C!-- Sun --%3E%3Ccircle cx='1700' cy='200' r='100' fill='%23FFD700' opacity='0.9'/%3E%3C!-- Clouds --%3E%3Cellipse cx='300' cy='200' rx='180' ry='90' fill='white' opacity='0.8'/%3E%3Cellipse cx='400' cy='220' rx='150' ry='80' fill='white' opacity='0.7'/%3E%3Cellipse cx='1000' cy='150' rx='200' ry='100' fill='white' opacity='0.75'/%3E%3Cellipse cx='1120' cy='170' rx='160' ry='85' fill='white' opacity='0.65'/%3E%3Cellipse cx='500' cy='400' rx='150' ry='75' fill='white' opacity='0.6'/%3E%3Cellipse cx='1500' cy='300' rx='200' ry='95' fill='white' opacity='0.7'/%3E%3C!-- Mountains --%3E%3Cpolygon points='100,700 350,350 600,700' fill='%2387CEEB' opacity='0.5'/%3E%3Cpolygon points='500,700 750,400 1000,700' fill='%23ADD8E6' opacity='0.6'/%3E%3Cpolygon points='900,700 1150,380 1400,700' fill='%2387CEEB' opacity='0.5'/%3E%3Cpolygon points='1300,700 1550,420 1800,700' fill='%23ADD8E6' opacity='0.6'/%3E%3C!-- Green Ground --%3E%3Crect y='700' width='1920' height='380' fill='%239ACD32'/%3E%3Crect y='820' width='1920' height='260' fill='%23228B22'/%3E%3Crect y='900' width='1920' height='180' fill='%238B7355'/%3E%3C/svg%3E`;

function unlockAudio() {
    correctSound.play().then(() => { correctSound.pause(); correctSound.currentTime = 0; });
    errorSound.play().then(() => { errorSound.pause(); errorSound.currentTime = 0; });
}

function startGame(mode) {
    unlockAudio();
    gameMode = mode;
    currentIndex = 0;
    tubeEnergy = 0;
    correctCount = 0;

    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    document.getElementById('tube-outer').style.display = 'block';
    document.getElementById('tube-fill').style.height = '0%';

    /* ☀️ OYUN = GÜNDÜZ */
    document.getElementById('bg-layer').style.backgroundImage = `url('${dayBackground}')`;

    if(mode === 'timed') document.getElementById('timed-ui').style.display = 'inline';

    gameData = [...allWords].sort(() => Math.random() - 0.5).slice(0, 10);
    startTime = Date.now();
    startStopwatch();
    loadLevel();
}

function startStopwatch() {
    timerInterval = setInterval(() => {
        let diff = Math.floor((Date.now() - startTime) / 1000);
        let m = Math.floor(diff / 60).toString().padStart(2, '0');
        let s = (diff % 60).toString().padStart(2, '0');
        document.getElementById('stopwatch').textContent = `${m}:${s}`;
    }, 1000);
}

function startCountdown() {
    if(gameMode !== 'timed') return;
    clearInterval(countdownInterval);
    timeLeft = 15;
    document.getElementById('countdown').textContent = timeLeft;
    countdownInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('countdown').textContent = timeLeft;
        if(timeLeft <= 0) {
            clearInterval(countdownInterval);
            errorSound.play();
            handleTimeOut();
        }
    }, 1000);
}

function handleTimeOut() {
    const inputs = document.querySelectorAll('.letter-input');
    inputs.forEach(input => input.classList.add('error'));
    tubeEnergy = Math.max(0, tubeEnergy - 5);
    updateTube();
    setTimeout(() => nextLevel(), 800);
}

function loadLevel() {
    const current = gameData[currentIndex];
    document.getElementById('current-formula').textContent = current.q;
    document.getElementById('q-counter').textContent = `${currentIndex + 1} / 10`;
    const container = document.getElementById('letter-container');
    container.innerHTML = '';

    for (let i = 0; i < current.a.length; i++) {
        const input = document.createElement('input');
        input.type = 'text'; input.maxLength = 1; input.className = 'letter-input';
        input.setAttribute('autocomplete', 'off');
        input.addEventListener('input', (e) => {
            if (e.target.value.length === 1) {
                if (container.children[i + 1]) container.children[i + 1].focus();
                checkAnswer();
            }
        });
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && e.target.value === '' && container.children[i - 1]) {
                container.children[i - 1].focus();
            }
        });
        container.appendChild(input);
    }
    setTimeout(() => container.children[0].focus(), 100);
    startCountdown();
}

function checkAnswer() {
    const inputs = document.querySelectorAll('.letter-input');
    let userWord = "";
    inputs.forEach(input => userWord += input.value);
    const target = gameData[currentIndex].a;

    if (userWord.length === target.length) {
        if (userWord.toLowerCase() === target.toLowerCase()) {
            clearInterval(countdownInterval);
            correctSound.play();
            inputs.forEach(input => {
                input.classList.add('correct');
                input.disabled = true;
            });
            tubeEnergy = Math.min(100, tubeEnergy + 10);
            correctCount++;
            updateTube();
            setTimeout(() => nextLevel(), 600);
        } else {
            errorSound.play();
            inputs.forEach(input => {
                input.classList.add('error');
                setTimeout(() => input.classList.remove('error'), 400);
            });
        }
    }
}

function updateTube() {
    document.getElementById('tube-fill').style.height = tubeEnergy + '%';
}

function nextLevel() {
    currentIndex++;
    if (currentIndex < 10) loadLevel();
    else finishGame();
}

function finishGame() {
    clearInterval(timerInterval);
    clearInterval(countdownInterval);

    /* 🌙 BİTİŞ = GECE */
    document.getElementById('bg-layer').style.backgroundImage = `url('${nightBackground}')`;

    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('tube-outer').style.display = 'none';
    document.getElementById('final-screen').style.display = 'block';
    document.getElementById('final-time').textContent = document.getElementById('stopwatch').textContent;
    document.getElementById('final-score-text').textContent = `10 soruda ${correctCount} doğru cevap!`;

    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
}

// 🌙 BAŞLANGIÇ = GECE
document.getElementById('bg-layer').style.backgroundImage = `url('${nightBackground}')`;
</script>
</body>
</html>
