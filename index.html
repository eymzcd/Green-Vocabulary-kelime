<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blending - Kelime Türetme</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-color: #4caf50;
            --bg-glass: rgba(0, 0, 0, 0.7);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; color: white;
            background-color: #000;
        }

        /* GECE VE GÜNDÜZÜ YÖNETEN KATMAN */
        #bg-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-size: cover;
            background-position: center;
            z-index: -1;
            transition: background-image 1.5s ease-in-out; /* Geçiş yumuşatma */
            /* İLK AÇILIŞ: GECE RESMİ */
            background-image: url('https://images.unsplash.com/photo-1532767153582-b1a0e5145009?q=80&w=2000'); 
        }

        .card {
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            width: 90%; max-width: 500px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn {
            background: var(--primary-color);
            color: white; border: none;
            padding: 15px 30px; font-size: 1.2rem;
            border-radius: 15px; cursor: pointer;
            margin-top: 20px; width: 100%;
        }

        .letter-container { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .letter-input {
            width: 40px; height: 50px; font-size: 1.5rem;
            text-align: center; background: rgba(255,255,255,0.1);
            color: white; border: 2px solid #555; border-radius: 8px;
        }
        .correct { border-color: var(--primary-color) !important; background: rgba(76, 175, 80, 0.2); }
    </style>
</head>
<body>

    <div id="bg-layer"></div>

    <div class="card" id="menu-screen">
        <h1 style="color: var(--primary-color);">BLENDİNG</h1>
        <p>Kelimeleri birleştir, dünyayı aydınlat.</p>
        <button class="btn" onclick="startGame()">OYUNU BAŞLAT</button>
    </div>

    <div class="card" id="game-screen" style="display: none;">
        <h2 id="formula">Yükleniyor...</h2>
        <div class="letter-container" id="letter-container"></div>
    </div>

    <div class="card" id="final-screen" style="display: none;">
        <h1>Tebrikler Şampiyon!</h1>
        <p>Her şey aydınlandı.</p>
        <button class="btn" onclick="location.reload()">BAŞTAN OYNA</button>
    </div>

    <script>
        // RESİM LİNKLERİNİ BURADAN KONTROL EDEBİLİRSİN
        const NIGHT_IMG = "url('https://images.unsplash.com/photo-1532767153582-b1a0e5145009?q=80&w=2000')";
        const DAY_IMG = "url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?q=80&w=2000')";

        const words = [
            {q: "Bloom + Biology", a: "Bloomology"},
            {q: "Sprout + Maintain", a: "Sproutain"}
        ];
        let currentIdx = 0;

        function startGame() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';

            // GÜNDÜZE GEÇİŞ YAPILIYOR
            document.getElementById('bg-layer').style.backgroundImage = DAY_IMG;
            
            loadLevel();
        }

        function loadLevel() {
            const data = words[currentIdx];
            document.getElementById('formula').innerText = data.q;
            const container = document.getElementById('letter-container');
            container.innerHTML = '';

            for(let i=0; i<data.a.length; i++) {
                const input = document.createElement('input');
                input.className = 'letter-input';
                input.maxLength = 1;
                input.oninput = () => {
                    if(input.value && container.children[i+1]) container.children[i+1].focus();
                    checkAnswer();
                };
                container.appendChild(input);
            }
            container.children[0].focus();
        }

        function checkAnswer() {
            const inputs = document.querySelectorAll('.letter-input');
            let userVal = "";
            inputs.forEach(i => userVal += i.value);

            if(userVal.toLowerCase() === words[currentIdx].a.toLowerCase()) {
                inputs.forEach(i => i.classList.add('correct'));
                setTimeout(() => {
                    currentIdx++;
                    if(currentIdx < words.length) loadLevel();
                    else finishGame();
                }, 800);
            }
        }

        function finishGame() {
            // OYUN BİTTİĞİNDE GECEYE DÖNÜŞ (İstersen bunu kaldırabilirsin)
            document.getElementById('bg-layer').style.backgroundImage = NIGHT_IMG;
            
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('final-screen').style.display = 'block';
            confetti({ particleCount: 150, spread: 70 });
        }
    </script>
</body>
</html>
