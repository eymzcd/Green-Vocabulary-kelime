<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blending - Pixel Art Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-color: #4caf50;
            --bg-glass: rgba(0, 0, 0, 0.6);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Courier New', Courier, monospace; /* Pixel temasına uygun font */
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; color: white;
            background-color: #000;
        }

        #bg-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-size: cover; background-position: center;
            z-index: -1;
            transition: background-image 1.5s ease-in-out;
            /* BAŞLANGIÇTA SENİN ATTIĞIN GECE RESMİ */
            background-image: url('https://r.jina.ai/i/6f8812c8cc78440989d9724128a1be52'); 
        }

        .card {
            background: var(--bg-glass);
            backdrop-filter: blur(8px);
            padding: 30px; border-radius: 15px;
            text-align: center; width: 90%; max-width: 450px;
            border: 4px solid #fff; /* Pixel art tarzı kalın çerçeve */
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .btn {
            background: #e67e22; color: white; border: 4px solid #d35400;
            padding: 15px; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; width: 100%; margin-top: 20px;
            image-rendering: pixelated;
        }

        .btn:hover { background: #d35400; }

        .letter-container { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
        .letter-input {
            width: 35px; height: 45px; text-align: center;
            font-size: 1.5rem; background: #fff; color: #000;
            border: 3px solid #333; outline: none;
        }
    </style>
</head>
<body>

    <div id="bg-layer"></div>

    <div class="card" id="menu-screen">
        <h1 style="color: #f1c40f; text-shadow: 2px 2px #000;">BLENDİNG</h1>
        <p>Doğayı aydınlatmak için kelimeleri çöz!</p>
        <button class="btn" onclick="startGame()">MACERAYA BAŞLA</button>
    </div>

    <div class="card" id="game-screen" style="display: none;">
        <h2 id="formula" style="background: rgba(0,0,0,0.5); padding: 10px;">---</h2>
        <div class="letter-container" id="letter-container"></div>
    </div>

    <script>
        // SENİN ATTIĞIN RESİMLERİN ADRESLERİ
        const NIGHT_IMG = "url('https://r.jina.ai/i/6f8812c8cc78440989d9724128a1be52')";
        const DAY_IMG = "url('https://r.jina.ai/i/05e26da6899f4d309be0be9337581f18')";

        const words = [{q: "Bloom + Biology", a: "Bloomology"}];

        function startGame() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            
            // GÜNDÜZ RESMİNE GEÇİŞ
            document.getElementById('bg-layer').style.backgroundImage = DAY_IMG;
            
            loadLevel();
        }

        function loadLevel() {
            const data = words[0];
            document.getElementById('formula').innerText = data.q;
            const container = document.getElementById('letter-container');
            container.innerHTML = '';
            for(let i=0; i<data.a.length; i++) {
                const input = document.createElement('input');
                input.className = 'letter-input';
                input.maxLength = 1;
                input.oninput = () => {
                    if(input.value && container.children[i+1]) container.children[i+1].focus();
                    checkAnswer();
                };
                container.appendChild(input);
            }
            container.children[0].focus();
        }

        function checkAnswer() {
            let guess = "";
            document.querySelectorAll('.letter-input').forEach(i => guess += i.value);
            if(guess.toLowerCase() === words[0].a.toLowerCase()) {
                confetti({ particleCount: 100, spread: 70 });
                setTimeout(() => {
                    alert("Orman Aydınlandı!");
                    // OYUN BİTİNCE GECEYE DÖNÜŞ (İstersen silebilirsin)
                    document.getElementById('bg-layer').style.backgroundImage = NIGHT_IMG;
                    location.reload();
                }, 1000);
            }
        }
    </script>
</body>
</html>
